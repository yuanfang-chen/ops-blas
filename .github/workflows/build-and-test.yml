name: Build and Test blasLtMatmul

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and run blasLtMatmul
        run: bash build.sh --soc=ascend910b --ops=blasLtMatmul --run
